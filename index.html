<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>GeoAR.js demo</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <!-- <script src="./script.js"></script> -->
    <link rel="stylesheet" type="text/css" href="./style.css" />
  </head>

  <body style="margin: 0; overflow: hidden">
    <div class="centered instructions"></div>
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;"
    >
      <a-image gps-entity-place = "latitude: 21.0078808; longitude: 105.8495172"src="./assets/1.jpg" scale="1 1 1"></a-text></a-image>
      <a-image gps-entity-place = "latitude: 21.0078808; longitude: 105.8495409"src="./assets/2.jpg" scale="1 1 1" ></a-image>
      <a-image gps-entity-place = "latitude: 21.0077223; longitude: 105.8495172"src="./assets/image.jpg" scale="1 1 1"></a-image>
      <a-camera gps-camera rotation-reader maxDistance=5 ></a-camera>
    </a-scene>
    <!-- <div class="centered">
      <button data-action="change"></button>
    </div> -->
  </body>
</html>
