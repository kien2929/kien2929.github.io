<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>GeoAR.js demo</title>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-nft.js"></script>
    <!-- <script src="./script.js"></script> -->
    <link rel="stylesheet" type="text/css" href="./style.css" />
  </head>

  <body style="margin: 0; overflow: hidden">
    <div class="centered instructions"></div>
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: true;"
    >
      <a-image gps-entity-place = "latitude: 21.008077; longitude: 105.849761" rotation="0 0 0" src="./assets/image.jpg" width="3" height="1.5"></a-image>
      <a-camera gps-camera rotation-reader look-controls></a-camera>
    </a-scene>
    <div class="centered">
      <button data-action="change"></button>
    </div>
  </body>
</html>
